name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Linux arm64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ github.workspace }}/dtach-rs-${{ matrix.target }}.tar.gz dtach-rs

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path dtach-rs.exe -DestinationPath ${{ github.workspace }}/dtach-rs-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtach-rs-${{ matrix.target }}
          path: dtach-rs-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          set -euxo pipefail
          mkdir -p dist
          for f in dtach-rs-*/*; do
            cp "$f" dist/
          done
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  winget:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Submit manifest to winget-pkgs
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if (-not $env:WINGET_CREATE_GITHUB_TOKEN) {
            throw "WINGET_TOKEN repository secret is not set"
          }

          $version = '${{ github.ref_name }}' -replace '^v', ''
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/dtach-rs-x86_64-pc-windows-msvc.zip"

          curl.exe -JLO https://aka.ms/wingetcreate/latest
          .\wingetcreate.exe update --submit --version $version --urls "$url|x64" nicoavanzdev.dtach-rs

          if ($LASTEXITCODE -ne 0) {
            throw "WinGet update failed. If this is the first release, submit the initial manifest to winget-pkgs first."
          }
